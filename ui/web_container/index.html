<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHOES Pet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="room-shell" aria-label="ECHOES room scene">
        <section class="room-scene">
            <img
                class="room-background"
                src="../../assets/webm/characters/miku/BG_Final.png"
                alt="房間背景"
            >
            <div class="room-atmosphere"></div>
            <div class="room-chrome">
                <p class="room-eyebrow">ECHOES Room</p>
                <h1 id="room-character-name">未選擇角色</h1>
            </div>
            <div class="room-floor-glow"></div>
            <div class="room-stage">
                <div class="room-character-anchor">
                    <div id="pet-character" class="room-character">
                        <div class="room-character-shadow"></div>
                        <video id="pet-video" autoplay loop muted playsinline></video>
                    </div>
                </div>
            </div>
            <section id="action-status" class="action-status" data-tone="idle" aria-live="polite">
                <span class="action-status__dot"></span>
                <div class="action-status__copy">
                    <p class="action-status__label">行動狀態</p>
                    <p id="action-status-text" class="action-status__text">房間待命中</p>
                </div>
            </section>
            <section id="conversation-panel" class="conversation-panel" aria-live="polite">
                <div class="conversation-panel__header">
                    <p class="conversation-panel__eyebrow">最近互動</p>
                    <p id="conversation-queue-text" class="conversation-panel__queue">佇列 0</p>
                </div>
                <div id="conversation-list" class="conversation-list"></div>
            </section>
        </section>
    </main>
    <audio id="room-audio" preload="none"></audio>
    <script src="app.js"></script>
</body>
</html>
